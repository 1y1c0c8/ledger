  <style>
    :root{
      --bg:#f4f3ef; --card:#ffffff; --ink:#1c1b18; --muted:#8a877f;
      --line:#e7e5de; --accent:#0f766e; --accent-soft:#e3efed;
      --expense:#c0492f; --income:#2f7d4f; --transfer:#6b6f76;
      --shadow:0 1px 2px rgba(28,27,24,.05),0 6px 20px rgba(28,27,24,.06);
      --r:16px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;background:var(--bg);color:var(--ink);
      font-family:"Noto Sans TC","Manrope",system-ui,sans-serif;
      -webkit-font-smoothing:antialiased}
    body{padding:0 0 96px;max-width:560px;margin:0 auto}
    .num{font-family:"Manrope",sans-serif;font-variant-numeric:tabular-nums}

    header{position:sticky;top:0;z-index:20;background:rgba(244,243,239,.86);
      backdrop-filter:saturate(150%) blur(10px);
      padding:max(14px,env(safe-area-inset-top)) 18px 12px;
      display:flex;align-items:center;justify-content:space-between;gap:10px}
    .brand{font-family:"Manrope";font-weight:800;font-size:20px;letter-spacing:-.01em}

    .wrap{padding:6px 16px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
      box-shadow:var(--shadow)}

    /* segmented */
    .seg{display:flex;background:var(--card);border:1px solid var(--line);
      border-radius:14px;padding:4px;gap:4px;box-shadow:var(--shadow);margin:8px 0 16px}
    .seg button{flex:1;border:0;background:transparent;color:var(--muted);
      padding:11px 0;border-radius:10px;font-size:15px;font-weight:700;
      font-family:"Noto Sans TC";cursor:pointer;transition:.18s}
    .seg button[data-on="支出"].active{background:var(--expense);color:#fff}
    .seg button[data-on="收入"].active{background:var(--income);color:#fff}
    .seg button[data-on="轉帳"].active{background:var(--transfer);color:#fff}
    .seg button.active{background:var(--accent-soft);color:var(--accent)} /* 日/月/年等中性切換的預設 active（上面有指定色的會覆蓋此條） */

    .amount-box{padding:18px 18px 6px;text-align:center}
    .amount-box label{display:block;font-size:13px;color:var(--muted);font-weight:600;margin-bottom:2px}
    .amount-input{width:100%;border:0;text-align:center;background:transparent;
      font-family:"Manrope";font-weight:800;font-size:46px;color:var(--ink);
      letter-spacing:-.02em;outline:none}
    .amount-input::placeholder{color:#d4d1c8}

    .field{padding:13px 18px;border-top:1px solid var(--line);display:flex;
      align-items:center;justify-content:space-between;gap:12px}
    .field label{font-size:14px;color:var(--muted);font-weight:600;white-space:nowrap}
    .field select,.field input[type=date],.field input[type=datetime-local],.field input[type=month],.field input[type=text]{
      flex:1;border:0;background:transparent;text-align:right;font-size:16px;
      color:var(--ink);font-family:inherit;outline:none;-webkit-appearance:none;
      font-weight:600}
    .field select{direction:rtl}

    /* 付款方（信用卡支出才出現） */
    .paybtns{display:flex;gap:6px}
    .paybtns button{border:1px solid var(--line);background:var(--card);color:var(--muted);
      border-radius:999px;padding:5px 12px;font-size:13px;font-weight:700;
      font-family:"Noto Sans TC";cursor:pointer}
    .paybtns button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    input[type=range]{accent-color:var(--accent)}

    .save{position:fixed;left:0;right:0;bottom:0;z-index:30;
      padding:12px 16px max(14px,env(safe-area-inset-bottom));
      background:linear-gradient(transparent,var(--bg) 28%);max-width:560px;margin:0 auto}
    .save button{width:100%;border:0;border-radius:14px;padding:16px;
      font-size:17px;font-weight:700;font-family:"Noto Sans TC";color:#fff;
      background:var(--accent);box-shadow:var(--shadow);cursor:pointer}
    .save button:active{transform:scale(.99)}
    .save button:disabled{opacity:.5}

    /* tabs */
    .tabbar{display:flex;gap:6px;margin:4px 0 10px}
    .tabbar button{flex:1;border:0;background:transparent;color:var(--muted);
      font-weight:700;font-size:15px;padding:8px;border-radius:10px;cursor:pointer;
      font-family:"Noto Sans TC"}
    .tabbar button.active{background:var(--accent-soft);color:var(--accent)}

    /* list */
    .row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-top:1px solid var(--line)}
    .row:first-child{border-top:0}
    .dot{width:9px;height:9px;border-radius:50%;flex:none}
    .row .mid{flex:1;min-width:0}
    .row .t1{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .row .t2{font-size:12px;color:var(--muted);margin-top:1px}
    .row .amt{font-family:"Manrope";font-weight:700;font-size:16px;white-space:nowrap}

    /* summary */
    .sum{display:flex;padding:16px;gap:8px}
    .sum>div{flex:1;text-align:center}
    .sum .k{font-size:12px;color:var(--muted);font-weight:600}
    .sum .v{font-family:"Manrope";font-weight:800;font-size:21px;margin-top:3px}

    .sect-title{font-size:13px;color:var(--muted);font-weight:700;margin:18px 4px 8px}
    .bal-group{font-size:12px;color:var(--muted);font-weight:700;padding:11px 16px 4px}
    .networth{padding:14px 16px;display:flex;justify-content:space-between;align-items:baseline}
    .networth .v{font-family:"Manrope";font-weight:800;font-size:22px}

    canvas{max-width:100%}
    .chart-wrap{padding:18px}
    .empty{padding:30px 16px;text-align:center;color:var(--muted);font-size:14px}
    .hide{display:none!important}
    .toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%) translateY(20px);
      background:var(--ink);color:#fff;padding:11px 20px;border-radius:999px;font-size:14px;
      font-weight:600;opacity:0;transition:.25s;z-index:50;pointer-events:none}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .pos{color:var(--income)} .neg{color:var(--expense)}

    /* 可點的清單列 */
    .row.tap{cursor:pointer}
    .row.tap:active{background:var(--accent-soft)}

    /* 顯示更多 */
    .more-btn{border:1px solid var(--line);background:var(--card);border-radius:999px;
      padding:9px 18px;font-size:14px;font-weight:700;color:var(--accent);
      font-family:"Noto Sans TC";box-shadow:var(--shadow);cursor:pointer}

    /* 底部彈出層（操作選單 / 編輯小視窗共用） */
    .overlay{position:fixed;inset:0;z-index:60;background:rgba(28,27,24,.42);
      display:flex;align-items:flex-end;justify-content:center;
      opacity:0;pointer-events:none;transition:.2s}
    .overlay.show{opacity:1;pointer-events:auto}
    .sheet{background:var(--card);width:100%;max-width:560px;max-height:92vh;overflow:auto;
      border-radius:20px 20px 0 0;
      padding:8px 16px max(16px,env(safe-area-inset-bottom));
      transform:translateY(24px);transition:.2s}
    .overlay.show .sheet{transform:translateY(0)}
    .grip{width:38px;height:4px;border-radius:2px;background:var(--line);margin:8px auto 12px}
    .sheet-title{font-family:"Manrope";font-weight:800;font-size:17px;text-align:center;margin:2px 0 12px}
    .sheet-sum{text-align:center;padding:2px 0 14px}
    .sheet-sum .t1{font-weight:700;font-size:16px}
    .sheet-sum .t2{color:var(--muted);font-size:13px;margin-top:3px}
    .sheet-btn{width:100%;border:0;border-radius:13px;padding:15px;font-size:16px;
      font-weight:700;font-family:"Noto Sans TC";margin-top:8px;cursor:pointer}
    .sheet-btn.edit{background:var(--accent-soft);color:var(--accent)}
    .sheet-btn.primary{background:var(--accent);color:#fff}
    .sheet-btn.del{background:var(--expense);color:#fff}
    .sheet-btn.cancel{background:transparent;color:var(--muted)}
    .sheet-btn:disabled{opacity:.5}
  </style>
</head>
<body>
  <header>
    <div class="brand">記帳</div>
  </header>

  <div class="wrap">
    <div class="tabbar">
      <button id="tabEntry" class="active" onclick="showTab('entry')">記帳</button>
      <button id="tabStats" onclick="showTab('stats')">統計</button>
      <button id="tabAcct" onclick="showTab('acct')">帳戶</button>
    </div>

    <!-- ===== 記帳 ===== -->
    <section id="viewEntry">
      <div class="seg" id="typeSeg">
        <button data-on="支出" class="active" onclick="setType('支出')">支出</button>
        <button data-on="收入" onclick="setType('收入')">收入</button>
        <button data-on="轉帳" onclick="setType('轉帳')">轉帳</button>
      </div>

      <div class="card">
        <div class="amount-box">
          <label>金額</label>
          <input class="amount-input num" id="amount" type="text" inputmode="decimal"
                 placeholder="0" oninput="cleanAmount(this)">
        </div>
        <div class="field hide" id="fOut">
          <label id="fOutLabel">出帳帳戶</label>
          <select id="accountOut"></select>
        </div>
        <div class="field hide" id="fIn">
          <label id="fInLabel">入帳帳戶</label>
          <select id="accountIn"></select>
        </div>
        <div class="field" id="fCat">
          <label>項目類別</label>
          <select id="category"></select>
        </div>
        <div class="field hide" id="fPay" style="flex-direction:column;align-items:stretch;gap:10px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <label>付款方</label>
            <div class="paybtns" id="payBtns">
              <button type="button" data-fam="0" class="active" onclick="setPay(0)">我全出</button>
              <button type="button" data-fam="100" onclick="setPay(100)">家裡全出</button>
              <button type="button" data-fam="split" onclick="setPay('split')">拆帳</button>
            </div>
          </div>
          <div class="hide" id="paySplit" style="display:flex;align-items:center;gap:10px">
            <label style="white-space:nowrap">家裡負擔</label>
            <input type="range" id="payPct" min="0" max="100" value="50" step="5"
                   oninput="PAYFAM=+this.value;$('payPctOut').textContent=this.value+'%'" style="flex:1">
            <span id="payPctOut" style="font-weight:700;min-width:42px;text-align:right">50%</span>
          </div>
        </div>
        <div class="field">
          <label>日期時間</label>
          <input type="datetime-local" id="date">
        </div>
        <div class="field">
          <label>備註</label>
          <input type="text" id="note" placeholder="選填" maxlength="60">
        </div>
      </div>

      <div class="sect-title">本月最近</div>
      <div class="card" id="recentList"><div class="empty">尚無紀錄</div></div>
    </section>

    <!-- ===== 統計 ===== -->
    <section id="viewStats" class="hide">
      <!-- 期間：日 / 月 / 年 -->
      <div class="seg" id="granSeg">
        <button data-on="day" onclick="setGran('day')">日</button>
        <button data-on="week" onclick="setGran('week')">週</button>
        <button data-on="month" class="active" onclick="setGran('month')">月</button>
        <button data-on="year" onclick="setGran('year')">年</button>
      </div>
      <div class="card field" id="pickerField" style="border-top:0;border-radius:var(--r);margin-bottom:10px">
        <label id="pickerLabel">月份</label>
        <span id="pickerSlot" style="flex:1;text-align:right"></span>
      </div>

      <div class="card sum">
        <div><div class="k">收入</div><div class="v pos num" id="sumIn">0</div></div>
        <div><div class="k">支出</div><div class="v neg num" id="sumOut">0</div></div>
        <div><div class="k">結餘</div><div class="v num" id="sumNet">0</div></div>
      </div>

      <div class="sect-title">分布</div>
      <div class="tabbar" id="pieKindTabs" style="margin:0 0 6px">
        <button class="active" data-kind="支出" onclick="setPieKind('支出')">支出</button>
        <button data-kind="收入" onclick="setPieKind('收入')">收入</button>
      </div>
      <div class="card field" id="pieAcctField" style="border-top:0;border-radius:var(--r);margin:0 0 8px">
        <label>帳戶</label>
        <select id="pieAcct"></select>
      </div>
      <div class="card chart-wrap" id="pieCard">
        <canvas id="pie" height="220"></canvas>
      </div>

      <div class="sect-title" id="statListTitle">明細</div>
      <div class="card" id="statList"><div class="empty">—</div></div>
      <div id="statMoreWrap" class="hide" style="text-align:center;margin-top:12px">
        <button class="more-btn" onclick="statShowMore()">顯示更多</button>
      </div>
    </section>

    <!-- ===== 帳戶 ===== -->
    <section id="viewAcct" class="hide">
      <div class="card hide" id="cardReminder" style="margin-bottom:8px;padding:10px 16px"></div>
      <div class="card networth">
        <span style="font-weight:700">淨資產</span>
        <span class="v num" id="networth">0</span>
      </div>
      <div class="card hide" id="cardSplitEntry" onclick="openCardSplit()"
           style="margin-top:8px;display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer">
        <div><div style="font-weight:600;font-size:15px">本月卡費分攤</div>
          <div id="cardSplitSub" style="color:var(--muted);font-size:12px;margin-top:1px">我 $0 · 家 $0</div></div>
        <span style="color:var(--muted)">›</span>
      </div>
      <div class="sect-title">帳戶餘額</div>
      <div class="card" id="balanceList"><div class="empty">—</div></div>
    </section>
  </div>

  <div class="save" id="saveBar">
    <button id="saveBtn" onclick="save()">儲存</button>
  </div>

  <!-- ===== 點一筆 → 操作選單 ===== -->
  <div class="overlay" id="actionSheet" onclick="if(event.target===this)closeSheets()">
    <div class="sheet">
      <div class="grip"></div>
      <div class="sheet-sum" id="actionSum"></div>
      <button class="sheet-btn edit" onclick="openEdit()">編輯</button>
      <button class="sheet-btn del" onclick="doDelete()">刪除</button>
      <button class="sheet-btn cancel" onclick="closeSheets()">取消</button>
    </div>
  </div>

  <!-- ===== 編輯小視窗 ===== -->
  <div class="overlay" id="editModal" onclick="if(event.target===this)closeSheets()">
    <div class="sheet">
      <div class="grip"></div>
      <div class="sheet-title">編輯紀錄</div>
      <div class="seg" id="eTypeSeg" style="margin-top:0">
        <button data-on="支出" onclick="setEditType('支出')">支出</button>
        <button data-on="收入" onclick="setEditType('收入')">收入</button>
        <button data-on="轉帳" onclick="setEditType('轉帳')">轉帳</button>
      </div>
      <div class="card">
        <div class="amount-box">
          <label>金額</label>
          <input class="amount-input num" id="eAmount" type="text" inputmode="decimal"
                 placeholder="0" oninput="cleanAmount(this)">
        </div>
        <div class="field hide" id="eFOut">
          <label id="eFOutLabel">出帳帳戶</label>
          <select id="eAccountOut"></select>
        </div>
        <div class="field hide" id="eFIn">
          <label id="eFInLabel">入帳帳戶</label>
          <select id="eAccountIn"></select>
        </div>
        <div class="field" id="eFCat">
          <label>項目類別</label>
          <select id="eCategory"></select>
        </div>
        <div class="field hide" id="eFPay" style="flex-direction:column;align-items:stretch;gap:10px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <label>付款方</label>
            <div class="paybtns" id="ePayBtns">
              <button type="button" data-fam="0" class="active" onclick="setEPay(0)">我全出</button>
              <button type="button" data-fam="100" onclick="setEPay(100)">家裡全出</button>
              <button type="button" data-fam="split" onclick="setEPay('split')">拆帳</button>
            </div>
          </div>
          <div class="hide" id="ePaySplit" style="display:flex;align-items:center;gap:10px">
            <label style="white-space:nowrap">家裡負擔</label>
            <input type="range" id="ePayPct" min="0" max="100" value="50" step="5"
                   oninput="EPAYFAM=+this.value;$('ePayPctOut').textContent=this.value+'%'" style="flex:1">
            <span id="ePayPctOut" style="font-weight:700;min-width:42px;text-align:right">50%</span>
          </div>
        </div>
        <div class="field">
          <label>日期時間</label>
          <input type="datetime-local" id="eDate">
        </div>
        <div class="field">
          <label>備註</label>
          <input type="text" id="eNote" placeholder="選填" maxlength="60">
        </div>
      </div>
      <button class="sheet-btn primary" id="eSaveBtn" onclick="saveEdit()">更新</button>
      <button class="sheet-btn cancel" onclick="closeSheets()">取消</button>
    </div>
  </div>

  <!-- ===== 本月卡費分攤（浮層）===== -->
  <div class="overlay" id="cardSplitSheet" onclick="if(event.target===this)closeSheets()">
    <div class="sheet">
      <div class="grip"></div>
      <div class="sheet-title" id="cardSplitTitle">本月卡費分攤</div>
      <div style="display:flex;gap:10px;margin-bottom:12px">
        <div style="flex:1;background:var(--accent-soft);border-radius:12px;padding:13px;text-align:center">
          <div style="font-size:12px;color:var(--accent);font-weight:700">我要出</div>
          <div class="num" style="font-size:24px;font-weight:800;color:var(--accent);margin-top:2px" id="csMine">$0</div>
        </div>
        <div style="flex:1;background:#f1efe8;border-radius:12px;padding:13px;text-align:center">
          <div style="font-size:12px;color:var(--muted);font-weight:700">家裡出</div>
          <div class="num" style="font-size:24px;font-weight:800;margin-top:2px" id="csFam">$0</div>
        </div>
      </div>
      <div class="card" id="csList"></div>
      <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:10px">依每筆刷卡的付款方比例計算 · 不會自動扣款</div>
      <button class="sheet-btn cancel" onclick="closeSheets()">關閉</button>
    </div>
  </div>

  <!-- ===== 卡片帳單（浮層）===== -->
  <div class="overlay" id="stmtSheet" onclick="if(event.target===this)closeSheets()">
    <div class="sheet">
      <div class="grip"></div>
      <div class="sheet-title" id="stmtTitle">帳單</div>
      <div style="display:flex;justify-content:center;align-items:center;gap:20px;margin-bottom:4px">
        <button onclick="stmtNav(-1)" aria-label="上一期" style="border:0;background:transparent;font-size:22px;color:var(--accent);cursor:pointer">‹</button>
        <span id="stmtRange" style="font-weight:700;font-family:Manrope">—</span>
        <button onclick="stmtNav(1)" aria-label="下一期" style="border:0;background:transparent;font-size:22px;color:var(--accent);cursor:pointer">›</button>
      </div>
      <div class="sheet-sum" id="stmtMeta" style="padding-top:0"></div>
      <div class="card" style="padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="t2" style="color:var(--muted)">結帳日</span>
        <input id="stmtClose" type="number" inputmode="numeric" min="1" max="31" placeholder="—"
               style="width:52px;border:1px solid var(--line);border-radius:8px;padding:5px;text-align:center;font-weight:700">
        <span class="t2" style="color:var(--muted)">繳款日</span>
        <input id="stmtDue" type="number" inputmode="numeric" min="1" max="31" placeholder="—"
               style="width:52px;border:1px solid var(--line);border-radius:8px;padding:5px;text-align:center;font-weight:700">
        <button class="more-btn" style="padding:6px 12px" onclick="saveCardDates()">儲存</button>
      </div>
      <div class="card" id="stmtList"></div>
      <div style="display:flex;justify-content:space-between;margin:10px 4px 2px">
        <span class="t2" style="color:var(--muted)">本期合計</span><span id="stmtTotal" class="num" style="font-weight:700">$0</span></div>
      <div style="display:flex;justify-content:space-between;margin:0 4px 12px">
        <span class="t2" style="color:var(--muted)">分攤</span><span id="stmtSplit" class="t2" style="color:var(--muted)">我 $0 · 家 $0</span></div>
      <div id="stmtPayWrap"></div>
      <button class="sheet-btn cancel" onclick="closeSheets()">關閉</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    let CONFIG = null, TYPE = '支出', pieChart = null;
    let ENTRYMONTH = null;                 // 記帳頁固定看當月
    let LASTENTRY = null, STAT = null, BAL = null, EDITING = null;
    let GRAN = 'month', STATKEY = null, PIEKIND = '支出', PIEACCT = '__all__';
    let PAYFAM = 0, EPAYFAM = 0;            // 付款方：家裡負擔%（記帳表單 / 編輯視窗）
    let STMTCARD = null, STMTYM = null, STMT = null;   // 卡片帳單頁狀態
    const PAGE = 15;                       // 統計明細一次顯示筆數
    let statShown = PAGE;
    const ENTRY_RECENT = 8;                // 記帳頁「本月最近」顯示筆數
    const $ = id => document.getElementById(id);
    const fmt = n => (n<0?'-':'') + '$' + Math.abs(Math.round(n)).toLocaleString('en-US');

    function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),1600);}

    function cleanAmount(el){el.value = el.value.replace(/[^\d.]/g,'').replace(/(\..*)\./g,'$1');}

    // 給 datetime-local 用的「現在」字串：yyyy-MM-ddTHH:mm（當地時間）
    function nowLocalDT(){
      const d=new Date(), p=n=>String(n).padStart(2,'0');
      return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
    }

    // 初始化
    google.script.run.withSuccessHandler(onConfig).withFailureHandler(err).getConfig();

    function onConfig(cfg){
      CONFIG = cfg;
      ENTRYMONTH = cfg.currentMonth;
      STATKEY = cfg.currentMonth;        // 統計預設：本月
      $('date').value = nowLocalDT();
      setType('支出');
      $('accountOut').onchange = updatePayVis;     // 出帳改成信用卡才顯示付款方
      $('eAccountOut').onchange = updateEPayVis;
      buildPieAcct();
      $('pieAcct').onchange = ()=>{ PIEACCT = $('pieAcct').value; redrawPie(); };
      loadEntry();
    }

    function opts(arr){return arr.map(a=>`<option value="${a.name}">${a.name}</option>`).join('');}

    function setType(t){
      TYPE = t;
      document.querySelectorAll('#typeSeg button').forEach(b=>
        b.classList.toggle('active', b.dataset.on===t));
      const assets = CONFIG.accounts.filter(a=>a.type==='資產');
      const payFrom = CONFIG.accounts.filter(a=>a.type==='資產'||a.type==='負債'); // 含信用卡
      const allReal = CONFIG.accounts; // 轉帳可含「外部／他人」(家人代繳)

      if(t==='支出'){
        show('fOut',true); show('fIn',false); show('fCat',true);
        $('fOutLabel').textContent='出帳帳戶（誰付的）';
        $('accountOut').innerHTML = opts(payFrom);
        $('category').innerHTML = opts(CONFIG.categories.filter(c=>c.kind==='支出'));
      } else if(t==='收入'){
        show('fOut',false); show('fIn',true); show('fCat',true);
        $('fInLabel').textContent='入帳帳戶（進到哪）';
        $('accountIn').innerHTML = opts(assets);
        $('category').innerHTML = opts(CONFIG.categories.filter(c=>c.kind==='收入'));
      } else {
        show('fOut',true); show('fIn',true); show('fCat',false);
        $('fOutLabel').textContent='從';
        $('fInLabel').textContent='到';
        $('accountOut').innerHTML = opts(allReal);
        $('accountIn').innerHTML = opts(allReal);
      }
      updatePayVis();
    }
    function show(id,on){$(id).classList.toggle('hide',!on);}

    // ---- 付款方（信用卡支出才出現）----
    function isLiability(name){ const a = CONFIG && CONFIG.accounts.find(x=>x.name===name); return !!a && a.type==='負債'; }
    function updatePayVis(){ show('fPay', TYPE==='支出' && isLiability($('accountOut').value)); }
    function setPay(v){
      const split = v==='split';
      show('paySplit', split);
      document.querySelectorAll('#payBtns button').forEach(b=>b.classList.toggle('active', b.dataset.fam===String(v)));
      PAYFAM = split ? (+$('payPct').value) : v;
    }
    function resetPay(){ $('payPct').value=50; $('payPctOut').textContent='50%'; setPay(0); }
    function updateEPayVis(){ show('eFPay', $('eTypeSeg').dataset.type==='支出' && isLiability($('eAccountOut').value)); }
    function setEPay(v){
      const split = v==='split';
      show('ePaySplit', split);
      document.querySelectorAll('#ePayBtns button').forEach(b=>b.classList.toggle('active', b.dataset.fam===String(v)));
      EPAYFAM = split ? (+$('ePayPct').value) : v;
    }
    function applyEPay(fp){
      if(fp==null || fp===0) setEPay(0);
      else if(fp===100) setEPay(100);
      else { $('ePayPct').value=fp; $('ePayPctOut').textContent=fp+'%'; setEPay('split'); }
    }

    function save(){
      const amt = parseFloat($('amount').value);
      if(!(amt>0)){toast('請輸入金額');return;}
      if(TYPE==='轉帳' && $('accountOut').value===$('accountIn').value){
        toast('轉出與轉入不能相同');return;}
      $('saveBtn').disabled=true; $('saveBtn').textContent='儲存中…';
      const t = {
        type:TYPE, amount:amt, date:$('date').value, note:$('note').value,
        accountOut: (TYPE==='收入')?'':$('accountOut').value,
        accountIn:  (TYPE==='支出')?'':$('accountIn').value,
        category:   (TYPE==='轉帳')?'轉帳':$('category').value
      };
      if(!$('fPay').classList.contains('hide')) t.famPct = PAYFAM;   // 只有刷卡支出才帶付款方
      google.script.run.withSuccessHandler(()=>{
        $('amount').value=''; $('note').value=''; $('date').value=nowLocalDT(); resetPay();
        $('saveBtn').disabled=false; $('saveBtn').textContent='儲存';
        toast('已記錄 ✓'); reloadAll();
      }).withFailureHandler(e=>{
        $('saveBtn').disabled=false; $('saveBtn').textContent='儲存'; err(e);
      }).addTransaction(t);
    }

    const TYPE_COLOR = {'支出':'var(--expense)','收入':'var(--income)','轉帳':'var(--transfer)'};

    // 一筆紀錄的列 HTML（記帳「本月最近」與統計「明細」共用）
    function rowHtml(t){
      const sign = t.type==='收入'?'+':(t.type==='支出'?'-':'');
      const label = t.type==='轉帳' ? `${t.accountOut} → ${t.accountIn}` : (t.category || t.type);
      const sub = (t.note? t.note+' · ':'') + (t.type==='收入'?t.accountIn:(t.type==='支出'?t.accountOut:'轉帳'));
      return `<div class="row tap" onclick="openActions('${t.sheet}',${t.row})">
        <span class="dot" style="background:${TYPE_COLOR[t.type]}"></span>
        <div class="mid"><div class="t1">${label}</div><div class="t2">${t.date.slice(5)} ${t.time} · ${sub}</div></div>
        <div class="amt num" style="color:${t.type==='轉帳'?'var(--ink)':TYPE_COLOR[t.type]}">${sign}${fmt(t.amount)}</div>
      </div>`;
    }

    // ---- 記帳頁：本月最近 ----
    function loadEntry(){
      google.script.run.withSuccessHandler(d=>{ LASTENTRY=d; renderEntryList(); })
        .withFailureHandler(err).getMonthData(ENTRYMONTH);
    }
    function renderEntryList(){
      const d = LASTENTRY, list = $('recentList');
      list.innerHTML = (!d || !d.txns.length) ? '<div class="empty">本月尚無紀錄</div>'
        : d.txns.slice(0, ENTRY_RECENT).map(rowHtml).join('');
      renderCardSplitEntry();
    }

    // ---- 本月卡費分攤（信用卡支出依付款方拆「我/家」）----
    function hasCards(){ return !!(CONFIG && CONFIG.accounts.some(a=>a.type==='負債')); }
    function cardSplit(txns){
      const cards = {}; (CONFIG?CONFIG.accounts:[]).forEach(a=>{ if(a.type==='負債') cards[a.name]=1; });
      let mine=0, fam=0; const per={};
      (txns||[]).forEach(t=>{
        if(t.type!=='支出' || !cards[t.accountOut]) return;
        const f=(t.famPct==null?0:t.famPct)/100, fa=t.amount*f, mi=t.amount-fa;
        mine+=mi; fam+=fa;
        per[t.accountOut] = per[t.accountOut] || {mine:0,fam:0};
        per[t.accountOut].mine+=mi; per[t.accountOut].fam+=fa;
      });
      return { mine, fam, per };
    }
    function renderCardSplitEntry(){
      const card = $('cardSplitEntry');
      if(!hasCards()){ card.classList.add('hide'); return; }
      const s = cardSplit(LASTENTRY && LASTENTRY.txns);
      $('cardSplitSub').textContent = `我 ${fmt(s.mine)} · 家 ${fmt(s.fam)}`;
      card.classList.remove('hide');
    }
    function openCardSplit(){
      const s = cardSplit(LASTENTRY && LASTENTRY.txns);
      $('cardSplitTitle').textContent = `本月卡費分攤 · ${ENTRYMONTH}`;
      $('csMine').textContent = fmt(s.mine);
      $('csFam').textContent = fmt(s.fam);
      const names = Object.keys(s.per);
      $('csList').innerHTML = names.length
        ? names.map(n=>`<div class="row"><div class="mid"><div class="t1">${n}</div></div>
            <div class="t2" style="color:var(--muted)">我 ${fmt(s.per[n].mine)} · 家 ${fmt(s.per[n].fam)}</div></div>`).join('')
        : '<div class="empty">本月沒有刷卡紀錄</div>';
      $('cardSplitSheet').classList.add('show');
    }

    // ---- 卡片帳單頁（功能 2＋1）----
    function payerLabel(fp){ return (fp==null||fp===0)?'我全出':(fp===100?'家全出':`拆${fp}%`); }
    function setSelDefault(id, name){ const s=$(id); if(s && [].slice.call(s.options).some(o=>o.value===name)) s.value=name; }

    function openStatement(card){ STMTCARD=card; STMTYM=null; loadStatement(card, null); }
    function loadStatement(card, ym){
      google.script.run.withSuccessHandler(st=>{ STMT=st; STMTYM=st.ym; renderStatement(st); $('stmtSheet').classList.add('show'); })
        .withFailureHandler(err).getCardStatement(card, ym);
    }
    function stmtNav(d){
      const [y,m]=STMTYM.split('-').map(Number); const dt=new Date(y, m-1+d, 1);
      loadStatement(STMTCARD, `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`);
    }
    function renderStatement(st){
      $('stmtTitle').textContent = st.card + ' 帳單';
      $('stmtRange').textContent = st.closeDate ? `${st.start.slice(5)} – ${st.end.slice(5)}` : st.ym;
      const status = !st.closeDate ? '尚未設定結帳日'
        : st.paid ? '<span style="color:var(--income)">已繳 ✓</span>'
        : st.isClosed ? '<span style="color:var(--expense)">待繳</span>' : '本期累計中';
      $('stmtMeta').innerHTML = '<span class="t2" style="color:var(--muted)">'
        + (st.closeDate ? `結帳 ${st.closeDate.slice(5)} · 繳款 ${st.dueDate?st.dueDate.slice(5):'—'} · ` : '')
        + status + '</span>';
      $('stmtClose').value = st.closeDay||''; $('stmtDue').value = st.dueDay||'';
      $('stmtList').innerHTML = st.txns.length
        ? st.txns.map(t=>`<div class="row"><div class="mid"><div class="t1">${t.category||'支出'}</div>
            <div class="t2">${t.date.slice(5)} ${t.time} · ${payerLabel(t.famPct)}</div></div>
            <div class="amt num neg">-${fmt(t.amount)}</div></div>`).join('')
        : '<div class="empty">這期沒有刷卡</div>';
      $('stmtTotal').textContent = fmt(st.total);
      $('stmtSplit').textContent = `我 ${fmt(st.mine)} · 家 ${fmt(st.fam)}`;
      renderPayArea(st);
    }
    function renderPayArea(st){
      const w = $('stmtPayWrap');
      if(!st.closeDate){ w.innerHTML=''; return; }
      if(st.paid){
        w.innerHTML = '<div style="text-align:center;color:var(--income);font-weight:700;margin:6px 0 8px">已記錄繳款 ✓</div>'
          + '<button class="sheet-btn del" onclick="undoPayment()">撤銷這期繳款</button>';
        return;
      }
      if(!st.isClosed){ w.innerHTML='<div style="text-align:center;color:var(--muted);font-size:12px;margin:6px 0 2px">本期尚未結帳，結帳後可記錄繳款</div>'; return; }
      const assetOpts = opts(CONFIG.accounts.filter(a=>a.type==='資產'));
      const amtStyle = 'width:90px;text-align:right;border:1px solid var(--line);border-radius:8px;padding:6px;font-weight:700;font-family:Manrope';
      w.innerHTML = `<div class="card" style="padding:4px 14px;margin-bottom:6px">
          <div class="field" style="border-top:0;justify-content:flex-start;gap:8px"><label>我的</label>
            <input id="payMineAmt" type="number" inputmode="numeric" value="${Math.round(st.mine)}" style="${amtStyle}">
            <span class="t2" style="color:var(--muted)">從</span><select id="payMine" style="flex:1">${assetOpts}</select></div>
          <div class="field" style="justify-content:flex-start;gap:8px"><label>家裡</label>
            <input id="payFamAmt" type="number" inputmode="numeric" value="${Math.round(st.fam)}" style="${amtStyle}">
            <span class="t2" style="color:var(--muted)">從</span><select id="payFam" style="flex:1">${assetOpts}</select></div>
        </div>
        <div class="t2" style="color:var(--muted);margin:0 2px 8px">金額預設為 App 估算，可改成銀行帳單實際金額；差額會留在卡片餘額、自動滾到下一期。</div>
        <button class="sheet-btn primary" onclick="doRecordPayment()">記錄繳款</button>`;
      setSelDefault('payMine','台新'); setSelDefault('payFam','郵局');
    }
    function saveCardDates(){
      const close=+$('stmtClose').value||0, due=+$('stmtDue').value||0;
      if(!close){ toast('請填結帳日'); return; }
      google.script.run.withSuccessHandler(()=>{ toast('已儲存帳單日'); loadStatement(STMTCARD, STMTYM); reloadAll(); })
        .withFailureHandler(err).setCardConfig(STMTCARD, close, due);
    }
    function doRecordPayment(){
      const mineAcct = $('payMine')?$('payMine').value:'';
      const famAcct = $('payFam')?$('payFam').value:'';
      const mineAmt = $('payMineAmt')?$('payMineAmt').value:'';
      const famAmt = $('payFamAmt')?$('payFamAmt').value:'';
      google.script.run.withSuccessHandler(r=>{
        if(r && r.ok===false){ toast(r.msg||'無法繳款'); return; }
        toast('已記錄繳款 ✓'); loadStatement(STMTCARD, STMTYM); reloadAll();
      }).withFailureHandler(err).recordCardPayment(STMTCARD, STMTYM, mineAcct, famAcct, mineAmt, famAmt);
    }
    function undoPayment(){
      if(!confirm('撤銷這期的繳款紀錄？會刪掉繳款產生的轉帳、把帳戶金額還原到繳費前。')) return;
      google.script.run.withSuccessHandler(r=>{
        if(r && r.ok===false){ toast(r.msg||'找不到繳款紀錄'); return; }
        toast('已撤銷繳款'); loadStatement(STMTCARD, STMTYM); reloadAll();
      }).withFailureHandler(err).reverseCardPayment(STMTCARD, STMTYM);
    }

    // ---- 統計頁：日 / 月 / 年 ----
    function setGran(g){
      GRAN = g; statShown = PAGE;
      document.querySelectorAll('#granSeg button').forEach(b=>b.classList.toggle('active', b.dataset.on===g));
      const now = new Date(), p = n=>String(n).padStart(2,'0');
      const todayStr = `${now.getFullYear()}-${p(now.getMonth()+1)}-${p(now.getDate())}`;
      const slot = $('pickerSlot'), lbl = $('pickerLabel');
      if(g==='day'){
        lbl.textContent='日期';
        if(!STATKEY || STATKEY.length!==10) STATKEY = todayStr;
        slot.innerHTML = `<input type="date" id="statPicker" value="${STATKEY}">`;
      } else if(g==='week'){
        lbl.textContent='週（選週內任一天）';
        if(!STATKEY || STATKEY.length!==10) STATKEY = todayStr;   // 與「日」共用日期選擇器，後端以週一為週首換算整週
        slot.innerHTML = `<input type="date" id="statPicker" value="${STATKEY}">`;
      } else if(g==='month'){
        lbl.textContent='月份';
        if(!STATKEY || STATKEY.length!==7) STATKEY = `${now.getFullYear()}-${p(now.getMonth()+1)}`;
        slot.innerHTML = `<input type="month" id="statPicker" value="${STATKEY}">`;
      } else {
        lbl.textContent='年份';
        const years = statYears();
        if(!STATKEY || STATKEY.length!==4) STATKEY = String(now.getFullYear());
        if(years.indexOf(STATKEY)===-1) years.unshift(STATKEY);
        slot.innerHTML = `<select id="statPicker">${years.map(y=>`<option value="${y}"${y===STATKEY?' selected':''}>${y}</option>`).join('')}</select>`;
      }
      $('statPicker').onchange = ()=>{ STATKEY = $('statPicker').value; statShown = PAGE; loadStats(); };
      loadStats();
    }
    function statYears(){
      const set = {};
      (CONFIG ? CONFIG.months : []).forEach(m=>set[m.slice(0,4)]=1);
      return Object.keys(set).sort().reverse();
    }
    function loadStats(){
      google.script.run.withSuccessHandler(d=>{ STAT=d; renderStatSummary(); renderStatList(); })
        .withFailureHandler(err).getStats(GRAN, STATKEY);
    }
    function renderStatSummary(){
      const d = STAT;
      $('sumIn').textContent = fmt(d.income);
      $('sumOut').textContent = fmt(d.expense);
      const net = $('sumNet'); net.textContent = fmt(d.net);
      net.className = 'v num ' + (d.net>=0?'pos':'neg');
      redrawPie();
    }
    function setPieKind(k){
      PIEKIND = k;
      document.querySelectorAll('#pieKindTabs button').forEach(b=>b.classList.toggle('active', b.dataset.kind===k));
      buildPieAcct();     // 帳戶清單依支出(出帳)/收入(入帳)改變
      redrawPie();
    }

    // 帳戶下拉：支出看「出帳帳戶」、收入看「入帳帳戶」；保留原選擇否則回到全部
    function buildPieAcct(){
      if(!CONFIG) return;
      const list = PIEKIND==='支出'
        ? CONFIG.accounts.filter(a=>a.type==='資產'||a.type==='負債')
        : CONFIG.accounts.filter(a=>a.type==='資產');
      $('pieAcct').innerHTML = ['<option value="__all__">所有帳戶</option>']
        .concat(list.map(a=>`<option value="${a.name}">${a.name}</option>`)).join('');
      if(PIEACCT!=='__all__' && list.some(a=>a.name===PIEACCT)) $('pieAcct').value = PIEACCT;
      else { PIEACCT='__all__'; $('pieAcct').value='__all__'; }
    }

    // 從 STAT.txns 即時算分布（依 支出/收入 與 選定帳戶 篩選）
    function computePie(){
      if(!STAT) return [];
      const byCat = {};
      STAT.txns.forEach(t=>{
        if(t.type!==PIEKIND) return;
        const acct = PIEKIND==='支出' ? t.accountOut : t.accountIn;
        if(PIEACCT!=='__all__' && acct!==PIEACCT) return;
        const c = t.category || '未分類';
        byCat[c] = (byCat[c]||0) + t.amount;
      });
      return Object.keys(byCat).map(k=>({label:k,value:byCat[k]})).sort((a,b)=>b.value-a.value);
    }
    function redrawPie(){ drawPie(computePie()); }
    function renderStatList(){
      const d = STAT, list = $('statList'), moreWrap = $('statMoreWrap');
      $('statListTitle').textContent = (d.label || STATKEY) + ' 明細';
      if(!d.txns.length){ list.innerHTML='<div class="empty">這段期間沒有紀錄</div>'; moreWrap.classList.add('hide'); return; }
      list.innerHTML = d.txns.slice(0, statShown).map(rowHtml).join('');
      const rest = d.txns.length - statShown;
      if(rest>0){ moreWrap.querySelector('button').textContent = `顯示更多（剩 ${rest} 筆）`; moreWrap.classList.remove('hide'); }
      else moreWrap.classList.add('hide');
    }
    function statShowMore(){ statShown += PAGE; renderStatList(); }

    // ---- 帳戶頁 ----
    function loadBalances(){
      google.script.run.withSuccessHandler(d=>{ BAL=d; renderBalances(); })
        .withFailureHandler(err).getBalances();
    }
    function renderBalances(){
      const d = BAL;
      $('balanceList').innerHTML = d.balances.map(b=>{
        if(b.type==='負債'){
          const useCycle = b.currentDue!=null;                 // 有設結帳日→顯示本期未繳，否則累計未繳
          const amt = useCycle ? b.currentDue : -b.balance;
          const t2 = (useCycle?'本期已刷':'未繳')
            + (b.closeDay? ` · ${b.closeDay}結帳·${b.dueDay||'?'}繳款` : ' · 點我設帳單日');
          return `<div class="row tap" onclick="openStatement('${b.name}')"><div class="mid">
              <div class="t1">${b.name}</div><div class="t2">${t2}</div></div>
            <div class="amt num" style="color:${amt>0?'var(--expense)':'var(--ink)'}">${fmt(amt)}<span style="color:var(--muted);font-weight:400"> ›</span></div></div>`;
        }
        return `<div class="row"><div class="mid">
            <div class="t1">${b.name}</div><div class="t2">${b.group}</div></div>
          <div class="amt num">${fmt(b.balance)}</div></div>`;
      }).join('') || '<div class="empty">—</div>';
      $('networth').textContent = fmt(d.networth);
      renderReminder();
    }

    // 帳戶 tab 提醒：上期待繳(含繳款日/剩幾天)＋ 即將結帳(提示核對金額/調整結帳日)
    function daysUntil(dateStr){
      if(!dateStr) return null;
      const [y,m,d]=dateStr.split('-').map(Number);
      const due=new Date(y,m-1,d); due.setHours(0,0,0,0);
      const now=new Date(); now.setHours(0,0,0,0);
      return Math.round((due-now)/86400000);
    }
    function renderReminder(){
      const box=$('cardReminder');
      if(!BAL){ box.classList.add('hide'); return; }
      const lines=[];
      BAL.balances.forEach(b=>{
        if(b.type!=='負債' || !b.closeDay) return;
        if(b.pending>0){
          const dd=daysUntil(b.pendingDue);
          const tag = dd==null?'' : (dd<0?`逾期 ${-dd} 天`:(dd===0?'今天到期':`剩 ${dd} 天`));
          const when = b.pendingDue?`${b.pendingDue.slice(5)} 前`:'';
          const col = (dd!=null&&dd<=3)?'var(--expense)':'var(--ink)';
          lines.push(`<div style="display:flex;justify-content:space-between;gap:8px;padding:5px 0;border-top:1px solid var(--line)">
            <span><b style="color:var(--expense)">待繳</b> ${b.name} ${fmt(b.pending)}</span>
            <span style="color:${col};font-weight:700;white-space:nowrap">${when} ${tag}</span></div>`);
        } else {
          const dc=daysUntil(b.nextClose);
          if(dc!=null && dc>=0 && dc<=3){
            lines.push(`<div style="display:flex;justify-content:space-between;gap:8px;padding:5px 0;border-top:1px solid var(--line)">
              <span>${b.name} 約 ${b.nextClose.slice(5)} 結帳</span>
              <span style="color:var(--muted);white-space:nowrap">剩 ${dc} 天 · 核對金額</span></div>`);
          }
        }
      });
      if(!lines.length){ box.classList.add('hide'); return; }
      box.innerHTML = '<div style="font-weight:700;font-size:13px;color:var(--muted)">提醒</div>'+lines.join('');
      box.classList.remove('hide');
    }

    // 任一筆變動（新增/編輯/刪除）後，刷新已載入過的各頁
    function reloadAll(){
      loadEntry();
      if(STAT) loadStats();
      if(BAL) loadBalances();
    }

    function drawPie(pie){
      if(!pie || !pie.length){
        if(pieChart){pieChart.destroy();pieChart=null;}
        $('pieCard').innerHTML='<div class="empty">這段期間沒有'+PIEKIND+'</div>'; return;
      }
      if(!document.getElementById('pie')){
        $('pieCard').innerHTML='<canvas id="pie" height="220"></canvas>';
        if(pieChart){pieChart.destroy();pieChart=null;}
      }
      const palette=['#0f766e','#c0492f','#d98a3d','#5b7fb5','#8a6fb0','#4f9d69','#b5577d','#7d7468','#3da3a3','#c2a04a'];
      const data={labels:pie.map(p=>p.label),datasets:[{data:pie.map(p=>p.value),
        backgroundColor:palette,borderWidth:2,borderColor:'#fff'}]};
      if(pieChart){pieChart.data=data;pieChart.update();return;}
      pieChart=new Chart($('pie'),{type:'doughnut',data,options:{
        cutout:'58%',plugins:{legend:{position:'bottom',
          labels:{font:{family:'Noto Sans TC',size:12},padding:12,boxWidth:12,usePointStyle:true}},
          tooltip:{callbacks:{label:c=>` ${c.label}　$${c.parsed.toLocaleString()}`}}}}});
    }

    // ===== 點一筆 → 操作選單 =====
    // 紀錄可能來自記帳的本月最近，或統計的期間明細；用 sheet+row 定位（row 在不同分頁會重複）
    function findTxn(sheet, row){
      for(const pool of [LASTENTRY && LASTENTRY.txns, STAT && STAT.txns]){
        if(pool){ const t = pool.find(x=>x.sheet===sheet && x.row===row); if(t) return t; }
      }
      return null;
    }

    function openActions(sheet, row){
      const t = findTxn(sheet, row); if(!t) return;
      EDITING = t;
      const sign = t.type==='收入'?'+':(t.type==='支出'?'-':'');
      const label = t.type==='轉帳' ? `${t.accountOut} → ${t.accountIn}` : (t.category || t.type);
      const where = t.type==='收入'?t.accountIn:(t.type==='支出'?t.accountOut:'轉帳');
      $('actionSum').innerHTML =
        `<div class="t1">${label}　<span style="color:${t.type==='轉帳'?'var(--ink)':TYPE_COLOR[t.type]}">${sign}${fmt(t.amount)}</span></div>
         <div class="t2">${t.date} ${t.time} · ${where}${t.note? ' · '+t.note : ''}</div>`;
      $('actionSheet').classList.add('show');
    }

    function closeSheets(){
      $('actionSheet').classList.remove('show');
      $('editModal').classList.remove('show');
      $('cardSplitSheet').classList.remove('show');
      $('stmtSheet').classList.remove('show');
    }

    function doDelete(){
      const t = EDITING; if(!t) return;
      if(!confirm('刪除這筆紀錄？')) return;
      google.script.run.withSuccessHandler(()=>{ closeSheets(); toast('已刪除'); reloadAll(); })
        .withFailureHandler(err).deleteRow(t.sheet, t.row);
    }

    // ===== 編輯小視窗 =====
    function setEditType(t){
      $('eTypeSeg').dataset.type = t;
      document.querySelectorAll('#eTypeSeg button').forEach(b=>
        b.classList.toggle('active', b.dataset.on===t));
      const assets  = CONFIG.accounts.filter(a=>a.type==='資產');
      const payFrom = CONFIG.accounts.filter(a=>a.type==='資產'||a.type==='負債');
      const allReal = CONFIG.accounts;
      if(t==='支出'){
        show('eFOut',true); show('eFIn',false); show('eFCat',true);
        $('eFOutLabel').textContent='出帳帳戶（誰付的）';
        $('eAccountOut').innerHTML = opts(payFrom);
        $('eCategory').innerHTML = opts(CONFIG.categories.filter(c=>c.kind==='支出'));
      } else if(t==='收入'){
        show('eFOut',false); show('eFIn',true); show('eFCat',true);
        $('eFInLabel').textContent='入帳帳戶（進到哪）';
        $('eAccountIn').innerHTML = opts(assets);
        $('eCategory').innerHTML = opts(CONFIG.categories.filter(c=>c.kind==='收入'));
      } else {
        show('eFOut',true); show('eFIn',true); show('eFCat',false);
        $('eFOutLabel').textContent='從'; $('eFInLabel').textContent='到';
        $('eAccountOut').innerHTML = opts(allReal);
        $('eAccountIn').innerHTML = opts(allReal);
      }
      updateEPayVis();
    }

    function openEdit(){
      const t = EDITING; if(!t) return;
      $('actionSheet').classList.remove('show');
      setEditType(t.type);                        // 先依類型建好欄位，再帶入原值
      $('eAmount').value = t.amount;
      $('eDate').value   = t.dt;                  // 'yyyy-MM-ddTHH:mm'
      $('eNote').value   = t.note || '';
      if(t.type!=='收入') $('eAccountOut').value = t.accountOut;
      if(t.type!=='支出') $('eAccountIn').value  = t.accountIn;
      if(t.type!=='轉帳') $('eCategory').value   = t.category;
      updateEPayVis(); applyEPay(t.famPct);
      $('editModal').classList.add('show');
    }

    function saveEdit(){
      const t = EDITING; if(!t) return;
      const type = $('eTypeSeg').dataset.type;
      const amt = parseFloat($('eAmount').value);
      if(!(amt>0)){ toast('請輸入金額'); return; }
      if(type==='轉帳' && $('eAccountOut').value===$('eAccountIn').value){
        toast('轉出與轉入不能相同'); return; }
      $('eSaveBtn').disabled=true; $('eSaveBtn').textContent='更新中…';
      const payload = {
        type:type, amount:amt, date:$('eDate').value, note:$('eNote').value,
        accountOut: (type==='收入')?'':$('eAccountOut').value,
        accountIn:  (type==='支出')?'':$('eAccountIn').value,
        category:   (type==='轉帳')?'轉帳':$('eCategory').value
      };
      if(!$('eFPay').classList.contains('hide')) payload.famPct = EPAYFAM;
      google.script.run.withSuccessHandler(()=>{
        $('eSaveBtn').disabled=false; $('eSaveBtn').textContent='更新';
        closeSheets(); toast('已更新 ✓'); reloadAll();
      }).withFailureHandler(e=>{
        $('eSaveBtn').disabled=false; $('eSaveBtn').textContent='更新'; err(e);
      }).updateRow(t.sheet, t.row, payload);
    }

    function showTab(v){
      $('viewEntry').classList.toggle('hide', v!=='entry');
      $('viewStats').classList.toggle('hide', v!=='stats');
      $('viewAcct').classList.toggle('hide', v!=='acct');
      $('saveBar').classList.toggle('hide', v!=='entry');
      $('tabEntry').classList.toggle('active', v==='entry');
      $('tabStats').classList.toggle('active', v==='stats');
      $('tabAcct').classList.toggle('active', v==='acct');
      if(v==='stats' && !STAT) setGran('month');   // 首次進統計：建立選擇器並載入
      if(v==='acct'){ loadBalances(); renderCardSplitEntry(); }   // 餘額會變，每次切入都刷新
    }

    function err(e){toast('發生錯誤：'+(e&&e.message?e.message:e));}
  </script>
</body>
</html>
